name: tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Ruff
        run: |
          ruff check src/scouting_ml/api src/scouting_ml/core src/scouting_ml/services src/scouting_ml/tests
      - name: API smoke check
        run: |
          PYTHONPATH=src python -c "from scouting_ml.api.main import app; paths = {route.path for route in app.routes}; required = {'/', '/health', '/market-value/health'}; missing = sorted(required - paths); assert not missing, missing; print('API smoke ok')"
      - name: Run tests
        run: pytest -q
