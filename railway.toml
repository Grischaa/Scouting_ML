[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn scouting_ml.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/market-value/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Configure these in the Railway dashboard:
# PYTHONPATH=src
# MODEL_ARTIFACTS_DIR=/app/data/model
# SCOUTING_API_CORS_ORIGINS=https://your-frontend.example.com
