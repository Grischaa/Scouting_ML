version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scoutml-backend
    environment:
      PYTHONPATH: src
      MODEL_ARTIFACTS_DIR: /app/data/model
      SCOUTING_API_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    networks:
      - scoutml

  frontend:
    image: nginx:1.27-alpine
    container_name: scoutml-frontend
    depends_on:
      - backend
    environment:
      SCOUTING_API_BASE: http://backend:8000
    ports:
      - "8080:8080"
    volumes:
      - ./src/scouting_ml/website/static:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/entrypoint.sh:/docker-entrypoint.d/40-runtime-config.sh:ro
    networks:
      - scoutml

networks:
  scoutml:
    driver: bridge
